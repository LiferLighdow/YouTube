apply plugin: 'com.android.application'

android {
    namespace "com.liferlighdow.youtube"  
    compileSdk 36

    defaultConfig {
        applicationId "com.liferlighdow.youtube"
        minSdkVersion 21
        targetSdkVersion 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.12.0'
}



